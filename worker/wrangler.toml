name = "myaiphotoshoot-landing-deploy-proxy"
compatibility_date = "2024-12-01"
main = "deploy-proxy.js"

# Required secret:
# - DEPLOY_WEBHOOK_URL (Cloudflare Pages deploy hook URL)
#
# Optional secrets for triggering GitHub workflow after deploy trigger:
# - GITHUB_ACTIONS_TRIGGER_TOKEN
# - GITHUB_OWNER (default: Andoctorey)
# - GITHUB_REPO (default: myaiphotoshoot-landing)
# - SEARCH_UPDATES_WORKFLOW_ID (default: submit-sitemap.yml)
# - SEARCH_UPDATES_REF (default: main)
