name: Submit Sitemap and IndexNow

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual triggering

jobs:
  submit-search-engines:
    name: Submit Search Engine Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          echo "This allows time for Cloudflare Pages to build and deploy the site"
          sleep 240
          
      - name: Submit sitemap to Google Search Console
        run: |
          echo "🚀 Starting sitemap submission..."
          node scripts/submit-sitemap.js
        env:
          NODE_ENV: production
          SEARCH_SUBMISSION_TOKEN: ${{ secrets.SEARCH_SUBMISSION_TOKEN }}

      - name: Submit URLs to IndexNow
        id: submit-indexnow
        continue-on-error: true
        run: |
          echo "🚀 Starting IndexNow submission..."
          if ! node scripts/submit-indexnow.js; then
            echo "::warning title=IndexNow submission failed::IndexNow submission failed. See the step logs for the HTTP status, response body, or exception."
            exit 1
          fi
        env:
          NODE_ENV: production
          SEARCH_SUBMISSION_TOKEN: ${{ secrets.SEARCH_SUBMISSION_TOKEN }}
          
      - name: Check IndexNow status
        run: |
          echo "🔍 Checking IndexNow status..."
          STATUS_BODY_FILE="/tmp/submit-indexnow-status.json"
          HTTP_STATUS=$(curl -sS -o "$STATUS_BODY_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer ${SEARCH_SUBMISSION_TOKEN}" \
            "https://myaiphotoshoot.com/submit-indexnow" || true)
          echo "HTTP status: ${HTTP_STATUS:-unknown}"
          RESPONSE_BODY=$(cat "$STATUS_BODY_FILE" 2>/dev/null || true)

          if [ -n "$RESPONSE_BODY" ] && echo "$RESPONSE_BODY" | jq -e . >/dev/null 2>&1; then
            echo "$RESPONSE_BODY" | jq '.'
          else
            echo "⚠️ Non-JSON or empty response from /submit-indexnow"
            echo "$RESPONSE_BODY" | head -c 500
            echo
          fi
        continue-on-error: true
        env:
          SEARCH_SUBMISSION_TOKEN: ${{ secrets.SEARCH_SUBMISSION_TOKEN }}
        
      - name: Success notification
        if: success()
        run: |
          echo "✅ Required search engine submissions completed successfully!"
          echo "📈 Your new content should be indexed faster by Google"
          echo "🔄 Future deployments will automatically notify both systems"

      - name: IndexNow warning
        if: steps.submit-indexnow.outcome == 'failure'
        run: |
          echo "⚠️ IndexNow submission failed, but it is non-blocking."
          echo "ℹ️ Google sitemap submission completed, and IndexNow can be retried manually."
          
      - name: Failure notification
        if: failure()
        run: |
          echo "⚠️ Search engine submission encountered issues"
          echo "ℹ️ This doesn't affect your deployment - your site is still live!"
          echo "ℹ️ Google will still discover your sitemap through robots.txt"
          echo "ℹ️ IndexNow can still be triggered manually at https://myaiphotoshoot.com/submit-indexnow"
          echo "🔗 Manual sitemap URL: https://myaiphotoshoot.com/sitemap.xml" 
